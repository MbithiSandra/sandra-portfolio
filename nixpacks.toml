[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.ctype",
  "php84Extensions.fileinfo",
  "php84Extensions.bcmath",
  "php84Extensions.curl",
  "php84Extensions.openssl",
  "composer"
]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT public/index.php"